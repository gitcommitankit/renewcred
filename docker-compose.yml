services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: renewcred
      POSTGRES_PASSWORD: renewcred_password
      POSTGRES_DB: renewcred_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renewcred -d renewcred_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express.js API Server
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      SERVER_PORT: 4000
      DATABASE_URL: postgresql://renewcred:renewcred_password@db:5432/renewcred_db?schema=public
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      db:
        condition: service_healthy

  # Next.js Client
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      API_URL: ${API_URL:-http://server:4000/api/v1}
    depends_on:
      - server

volumes:
  postgres_data:
